version: "3.9"

# NovaSurge — local dev without k8s
# Usage:
#   docker compose up --build          # start everything
#   docker compose up product-service  # start a single service + its deps
#   docker compose logs -f order-service
#
# Entry point: http://localhost:3000
# (No nginx in local dev — hit api-gateway directly)
#
# Monitoring:
#   Prometheus  http://localhost:9090
#   Grafana     http://localhost:3200   (admin / novasurge123)

x-python-base: &python-base
  build:
    context: .
  restart: unless-stopped
  environment:
    REDIS_HOST: redis
    REDIS_PORT: "6379"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks: [shopfusion]

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: novasurge
      POSTGRES_PASSWORD: novasurge123
      POSTGRES_DB: productsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novasurge -d productsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [shopfusion]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [shopfusion]

  # ── Application services ────────────────────────────────────────────────────
  product-service:
    <<: *python-base
    build:
      context: ./services/product-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: novasurge
      DB_PASSWORD: novasurge123
      DB_NAME: productsdb
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  payment-service:
    <<: *python-base
    build:
      context: ./services/payment-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: novasurge
      DB_PASSWORD: novasurge123
      DB_NAME: paymentsdb
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  order-service:
    <<: *python-base
    build:
      context: ./services/order-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: novasurge
      DB_PASSWORD: novasurge123
      DB_NAME: ordersdb
      PRODUCT_SERVICE_URL: http://product-service:8001
      PAYMENT_SERVICE_URL: http://payment-service:8003
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      product-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-service:
    build:
      context: ./services/notification-service
    restart: unless-stopped
    environment:
      PORT: "3001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [shopfusion]

  api-gateway:
    build:
      context: ./services/api-gateway
    restart: unless-stopped
    environment:
      PORT: "3000"
      PRODUCT_SERVICE_URL: http://product-service:8001
      ORDER_SERVICE_URL: http://order-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
    ports:
      - "3000:3000"
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [shopfusion]

  # ── Monitoring (optional, comment out to save RAM) ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./scripts/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [shopfusion]

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: novasurge123
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./scripts/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3200:3000"
    depends_on: [prometheus]
    networks: [shopfusion]

volumes:
  postgres_data:
  grafana_data:

networks:
  shopfusion:
    driver: bridge
