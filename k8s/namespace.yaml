apiVersion: v1
kind: Namespace
metadata:
  name: shopfusion
  labels:
    name: shopfusion
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: shopfusion-quota
  namespace: shopfusion
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "50"
    services: "20"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-allow-all
  namespace: shopfusion
spec:
  podSelector: {}
  ingress:
  - {}
  egress:
  - {}
  policyTypes:
  - Ingress
  - Egress
