apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-monitor
  namespace: shopfusion
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
    - shopfusion
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
