fullnameOverride: postgres-service

auth:
  username: novasurge
  password: novasurge123
  database: productsdb

primary:
  initdb:
    scripts:
      init_all_dbs.sql: |
        -- Grant on productsdb (created by auth.database)
        GRANT ALL PRIVILEGES ON DATABASE productsdb TO novasurge;

        -- Create ordersdb and paymentsdb if they don't exist
        SELECT 'CREATE DATABASE ordersdb'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'ordersdb')\gexec
        SELECT 'CREATE DATABASE paymentsdb'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'paymentsdb')\gexec

        GRANT ALL PRIVILEGES ON DATABASE ordersdb TO novasurge;
        GRANT ALL PRIVILEGES ON DATABASE paymentsdb TO novasurge;

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  persistence:
    enabled: true
    size: 5Gi

service:
  type: ClusterIP
  port: 5432
